<section class="dialog-container">
  <h2 mat-dialog-title>Add user</h2>
  <mat-dialog-content class="mat-typography">
    <h3>User data</h3>
    <p>Enter the user's information below. This data will be used to create a new user account in the system.</p>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button matButton mat-dialog-close>Cancel</button>
    <button matButton="filled" [mat-dialog-close]="true" cdkFocusInitial>Save</button>
  </mat-dialog-actions>
</section>
